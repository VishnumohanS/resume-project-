name: Full Stack CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:

  # 🔹 Backend (Node.js)
  backend:
    name: Backend Tests (Node)
    runs-on: ubuntu-latest

    services:
      mongo:
        image: mongo
        ports:
          - 27017:27017

      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: testdb
        ports:
          - 3306:3306

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install backend dependencies
        run: |
          cd server
          npm install

      - name: Run backend tests
        run: |
          cd server
          npm test
        env:
          MONGO_URI: mongodb://localhost:27017/test
          SQL_URI: mysql://root:root@localhost:3306/testdb


  # 🔹 Frontend (React)
  frontend:
    name: Frontend Build (React)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install frontend dependencies
        run: |
          cd client
          npm install

      - name: Build React app
        run: |
          cd client
          npm run build


  # 🔹 ML Service (Python)
  ml-service:
    name: ML Service Check (Python)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.10

      - name: Install ML dependencies
        run: |
          cd ml-service
          pip install -r requirements.txt

      - name: Run basic ML test
        run: |
          cd ml-service
          python -c "import sys; print('ML service is ready')"